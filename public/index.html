<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Predictor</title>
    <style>
      :root {
        --bg1: #f3efe3;
        --bg2: #dbe8d5;
        --card: #fffaf1;
        --text: #2a2a2a;
        --accent: #1f6f5f;
        --accent-2: #174f44;
        --error: #b42318;
        --border: #d5d0c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        animation: floatIn 360ms ease-out;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 2.5vw, 2rem);
        letter-spacing: 0.4px;
      }

      p.subtitle {
        margin-top: 0;
        margin-bottom: 18px;
        color: #505050;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input {
        width: 100%;
        font-size: 1rem;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        background: #fff;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(31, 111, 95, 0.15);
      }

      button {
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        padding: 0 20px;
        cursor: pointer;
        transition: transform 100ms ease, background 120ms ease;
      }

      button:hover {
        background: var(--accent-2);
      }

      button:active {
        transform: translateY(1px);
      }

      #result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        background: #f6f4ef;
        min-height: 44px;
        line-height: 1.4;
      }

      .error {
        color: var(--error);
      }

      @media (max-width: 560px) {
        .row {
          grid-template-columns: 1fr;
        }

        button {
          height: 44px;
        }
      }

      @keyframes floatIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Iris Prediction</h1>
      <p class="subtitle">Enter 4 comma-separated values: sepal length, sepal width, petal length, petal width.</p>

      <div class="row">
        <input id="data" placeholder="5.1,3.5,1.4,0.2" />
        <button id="predictBtn" type="button">Predict</button>
      </div>

      <p id="result">Prediction will appear here.</p>
    </main>

    <script>
      async function predict() {
        const resultElement = document.getElementById("result");
        resultElement.classList.remove("error");

        const raw = document.getElementById("data").value.trim();
        const data = raw.split(",").map((v) => Number(v.trim()));

        if (data.length !== 4 || data.some((n) => Number.isNaN(n))) {
          resultElement.classList.add("error");
          resultElement.textContent = "Please enter exactly 4 numeric values, e.g. 5.1,3.5,1.4,0.2";
          return;
        }

        try {
          resultElement.textContent = "Predicting...";

          const response = await fetch("/predict", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ data }),
          });

          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Prediction request failed");
          }

          const readable =
            typeof payload.prediction === "string"
              ? payload.prediction
              : JSON.stringify(payload.prediction);

          resultElement.textContent = "Prediction: " + readable;
        } catch (err) {
          resultElement.classList.add("error");
          resultElement.textContent = "Error: " + err.message;
        }
      }

      document.getElementById("predictBtn").addEventListener("click", predict);
      document.getElementById("data").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          predict();
        }
      });
    </script>
  </body>
</html>
